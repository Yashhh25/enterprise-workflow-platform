services:
  postgres:
    image: postgres:16-alpine
    container_name: enterprise-workflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-EnterpriseWorkflowDb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-EnterpriseWorkflowDb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Api/Dockerfile
    container_name: enterprise-workflow-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-EnterpriseWorkflowDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres123}
      JwtSettings__Secret: ${JWT_SECRET:-EnterpriseWorkflowPlatformJwtSecretKey2026!}
      JwtSettings__Issuer: ${JWT_ISSUER:-EnterpriseWorkflowPlatform}
      JwtSettings__Audience: ${JWT_AUDIENCE:-EnterpriseWorkflowPlatform}
      JwtSettings__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      ApplyMigrations: ${APPLY_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
